name: Build Release Binaries

# Trigger on version tags (v0.0.1, v1.0.0, etc.)
on:
  push:
    tags:
      - 'v*'

# Also allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # x86_64 builds (v2 baseline + v3 AVX2) — Alpine musl static
  # ============================================================
  build-x64:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: x64-v2
            march: v2
            cflags: "-march=x86-64-v2"
            compiler: gcc
            desc: "x86_64 baseline (any Intel/AMD 64-bit)"
          - variant: x64-v3
            march: v3
            cflags: "-march=x86-64-v3 -mavx2 -mfma"
            compiler: gcc
            desc: "x86_64 AVX2 (Haswell 2013+)"
          - variant: x64-v2-clang-lto
            march: v2
            cflags: "-march=x86-64-v2"
            compiler: clang
            desc: "x86_64 baseline, Clang + LTO"
          - variant: x64-v3-clang-lto
            march: v3
            cflags: "-march=x86-64-v3 -mavx2 -mfma"
            compiler: clang
            desc: "x86_64 AVX2, Clang + LTO"

    steps:
      - uses: actions/checkout@v6

      - name: Build static binary in Alpine container (${{ matrix.variant }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            -e COMPILER="${{ matrix.compiler }}" \
            -e CFLAGS_VARIANT="${{ matrix.cflags }}" \
            -e MARCH="${{ matrix.march }}" \
            alpine:3.21 sh -c '
              set -e

              apk add --no-cache \
                build-base cmake pkgconf linux-headers \
                libogg-dev libogg-static \
                wget xz

              # Install Clang + LLD if Clang build requested
              CMAKE_COMPILER_OPTS=""
              LIBUPNP_CC=""
              LIBFLAC_C_COMPILER=""
              if [ "$COMPILER" = "clang" ]; then
                apk add --no-cache clang lld llvm
                # Use lld as the linker for Clang builds (required for LTO with musl)
                CMAKE_COMPILER_OPTS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DLTO_MODE=thin -DLINKER=lld"
                LIBUPNP_CC="CC=clang"
                LIBFLAC_C_COMPILER="-DCMAKE_C_COMPILER=clang"
              fi

              # ── Build libupnp from source (static, controlled flags) ──
              wget -q https://github.com/pupnp/pupnp/releases/download/release-1.14.20/libupnp-1.14.20.tar.bz2
              tar xf libupnp-1.14.20.tar.bz2
              cd libupnp-1.14.20
              env $LIBUPNP_CC CFLAGS="$CFLAGS_VARIANT" ./configure \
                --enable-static --disable-shared \
                --disable-samples --disable-debug
              make -j$(nproc)
              make install
              cd /src

              # ── Build libFLAC from source (static) ──
              wget -q https://github.com/xiph/flac/releases/download/1.4.3/flac-1.4.3.tar.xz
              tar xf flac-1.4.3.tar.xz
              cd flac-1.4.3
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                $LIBFLAC_C_COMPILER \
                -DCMAKE_C_FLAGS="$CFLAGS_VARIANT" \
                -DBUILD_SHARED_LIBS=OFF \
                -DBUILD_PROGRAMS=OFF -DBUILD_TESTING=OFF \
                -DBUILD_DOCS=OFF -DINSTALL_MANPAGES=OFF \
                -DWITH_OGG=OFF
              cmake --build build -j$(nproc)
              cmake --install build
              cd /src

              # ── Build slim2upnp (static, core codecs only) ──
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                $CMAKE_COMPILER_OPTS \
                -DCMAKE_C_FLAGS="$CFLAGS_VARIANT" \
                -DCMAKE_CXX_FLAGS="$CFLAGS_VARIANT" \
                -DTARGET_MARCH="$MARCH" \
                -DSTATIC_BUILD=ON \
                -DNOLOG=ON \
                -DENABLE_MP3=OFF \
                -DENABLE_OGG=OFF \
                -DENABLE_AAC=OFF \
                -DENABLE_FFMPEG=OFF

              cmake --build build -j$(nproc)

              file build/slim2upnp
              strip build/slim2upnp
            '

      - name: Verify binary
        run: |
          file build/slim2upnp
          # Static binary should not need ldd, but check anyway
          ldd build/slim2upnp 2>&1 || true
          build/slim2upnp --version

      - name: Rename binary
        run: cp build/slim2upnp slim2upnp-${{ matrix.variant }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: slim2upnp-${{ matrix.variant }}
          path: slim2upnp-${{ matrix.variant }}

  # ============================================================
  # aarch64 build — Alpine musl static via QEMU
  # ============================================================
  build-aarch64:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: aarch64
            compiler: gcc
            desc: "ARM64 (Raspberry Pi 4/5, ARM servers)"
          - variant: aarch64-clang-lto
            compiler: clang
            desc: "ARM64, Clang + LTO"

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build static binary in Alpine ARM64 container (${{ matrix.variant }})
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            -e COMPILER="${{ matrix.compiler }}" \
            alpine:3.21 sh -c '
              set -e

              apk add --no-cache \
                build-base cmake pkgconf linux-headers \
                libogg-dev libogg-static \
                wget xz bzip2

              # Install Clang + LLD if Clang build requested
              CMAKE_COMPILER_OPTS=""
              LIBUPNP_CC=""
              LIBFLAC_C_COMPILER=""
              if [ "$COMPILER" = "clang" ]; then
                apk add --no-cache clang lld llvm
                # Use lld as the linker for Clang builds (required for LTO with musl)
                CMAKE_COMPILER_OPTS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DLTO_MODE=thin -DLINKER=lld"
                LIBUPNP_CC="CC=clang"
                LIBFLAC_C_COMPILER="-DCMAKE_C_COMPILER=clang"
              fi

              # ── Build libupnp from source (static, controlled flags) ──
              wget -q https://github.com/pupnp/pupnp/releases/download/release-1.14.20/libupnp-1.14.20.tar.bz2
              tar xf libupnp-1.14.20.tar.bz2
              cd libupnp-1.14.20
              env $LIBUPNP_CC ./configure \
                --enable-static --disable-shared \
                --disable-samples --disable-debug
              make -j$(nproc)
              make install
              cd /src

              # ── Build libFLAC from source (static) ──
              wget -q https://github.com/xiph/flac/releases/download/1.4.3/flac-1.4.3.tar.xz
              tar xf flac-1.4.3.tar.xz
              cd flac-1.4.3
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                $LIBFLAC_C_COMPILER \
                -DBUILD_SHARED_LIBS=OFF \
                -DBUILD_PROGRAMS=OFF -DBUILD_TESTING=OFF \
                -DBUILD_DOCS=OFF -DINSTALL_MANPAGES=OFF \
                -DWITH_OGG=OFF
              cmake --build build -j$(nproc)
              cmake --install build
              cd /src

              # ── Build slim2upnp (static, core codecs only) ──
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                $CMAKE_COMPILER_OPTS \
                -DSTATIC_BUILD=ON \
                -DNOLOG=ON \
                -DENABLE_MP3=OFF \
                -DENABLE_OGG=OFF \
                -DENABLE_AAC=OFF \
                -DENABLE_FFMPEG=OFF

              cmake --build build -j$(nproc)

              file build/slim2upnp
              strip build/slim2upnp
            '

      - name: Verify binary
        run: file build/slim2upnp

      - name: Rename binary
        run: cp build/slim2upnp slim2upnp-${{ matrix.variant }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: slim2upnp-${{ matrix.variant }}
          path: slim2upnp-${{ matrix.variant }}

  # ============================================================
  # Create GitHub Release with all binaries
  # ============================================================
  release:
    needs: [build-x64, build-aarch64]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/slim2upnp-x64-v2/slim2upnp-x64-v2 release/
          cp artifacts/slim2upnp-x64-v3/slim2upnp-x64-v3 release/
          cp artifacts/slim2upnp-x64-v2-clang-lto/slim2upnp-x64-v2-clang-lto release/
          cp artifacts/slim2upnp-x64-v3-clang-lto/slim2upnp-x64-v3-clang-lto release/
          cp artifacts/slim2upnp-aarch64/slim2upnp-aarch64 release/
          cp artifacts/slim2upnp-aarch64-clang-lto/slim2upnp-aarch64-clang-lto release/
          chmod +x release/*

          # Generate checksums
          cd release
          sha256sum slim2upnp-* > SHA256SUMS
          cat SHA256SUMS

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "slim2UPnP ${{ steps.version.outputs.version }}"
          body: |
            ## slim2UPnP ${{ steps.version.outputs.version }}

            Slimproto to UPnP bridge with native DSD support.

            ### Download

            **GCC builds:**

            | Binary | Architecture | Target |
            |--------|-------------|--------|
            | `slim2upnp-x64-v2` | x86_64 baseline | Any Intel/AMD 64-bit PC |
            | `slim2upnp-x64-v3` | x86_64 AVX2 | Modern PCs (Haswell 2013+) |
            | `slim2upnp-aarch64` | ARM64 | Raspberry Pi 4/5, ARM servers |

            **Clang + LTO builds** (experimental — may offer better audio performance):

            | Binary | Architecture | Target |
            |--------|-------------|--------|
            | `slim2upnp-x64-v2-clang-lto` | x86_64 baseline | Any Intel/AMD 64-bit PC |
            | `slim2upnp-x64-v3-clang-lto` | x86_64 AVX2 | Modern PCs (Haswell 2013+) |
            | `slim2upnp-aarch64-clang-lto` | ARM64 | Raspberry Pi 4/5, ARM servers |

            All binaries are **statically linked** — no shared library dependencies.
            Just download, `chmod +x`, and run on any Linux distribution.

            ### Quick install

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd slim2UPnP
            sudo ./install.sh
            ```

            The installer auto-detects your architecture, downloads the right binary,
            and sets up the systemd or OpenRC service.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: |
            release/slim2upnp-x64-v2
            release/slim2upnp-x64-v3
            release/slim2upnp-x64-v2-clang-lto
            release/slim2upnp-x64-v3-clang-lto
            release/slim2upnp-aarch64
            release/slim2upnp-aarch64-clang-lto
            release/SHA256SUMS
          draft: false
          prerelease: false
